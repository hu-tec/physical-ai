<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>휴텍씨 (Hutec) | 피지컬 AI 패러다임의 선두주자</title>
    <script>
      // GitHub Pages SPA redirect hack
      // This script converts the URL path into a query string parameter
      // and redirects to index.html, which then restores the correct route.
      var pathSegmentsToKeep = 1; // Keep '/physical-ai' prefix (1 segment)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
